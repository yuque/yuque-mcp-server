name: Publish

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.x'
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Build
      run: npm run build

    - name: Debug OIDC environment
      run: |
        echo "npm: $(npm -v), node: $(node -v)"
        echo "GITHUB_ACTIONS: $GITHUB_ACTIONS"
        echo "ACTIONS_ID_TOKEN_REQUEST_URL set: $([ -n \"$ACTIONS_ID_TOKEN_REQUEST_URL\" ] && echo YES || echo NO)"
        echo "ACTIONS_ID_TOKEN_REQUEST_TOKEN set: $([ -n \"$ACTIONS_ID_TOKEN_REQUEST_TOKEN\" ] && echo YES || echo NO)"
        npm config list
        echo "--- .npmrc ---"
        cat /home/runner/work/_temp/.npmrc 2>/dev/null || echo "No temp .npmrc"
        cat ~/.npmrc 2>/dev/null || echo "No user .npmrc"

    - name: Publish to npm (Trusted Publishing)
      run: npm publish --provenance --access public

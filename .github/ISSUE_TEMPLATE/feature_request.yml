name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this feature solve? Or what use case does it support?
      placeholder: e.g. When using yuque_get_doc, I cannot get the Lake format content...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or behavior you'd like to see.
      placeholder: e.g. Add an `include_lake` parameter to yuque_get_doc...
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: How do we know this is done? Prefer verifiable statements — expected behavior, example calls and outputs, checks that must pass.
      placeholder: |
        - yuque_get_doc with include_lake=true returns the raw Lake body
        - Contract tests and docs/capability-scope.md updated; npm run check passes
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or examples?
    validations:
      required: false
